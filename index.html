<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craic? - Deep Culture Map of Ireland</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom CSS for "Deep Culture" -->
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; }
        #map { height: 100vh; width: 100vw; }
        
        .map-header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .map-header h1 { margin: 0; color: #1a5e3c; font-size: 1.5rem; }
        .map-header p { margin: 5px 0 0; font-size: 0.9rem; color: #666; }
        
        .popup-content {
            max-width: 300px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .popup-content h3 { margin-top: 0; color: #1a5e3c; border-bottom: 2px solid #1a5e3c; padding-bottom: 5px; }
        .popup-content h4 { margin: 15px 0 5px; color: #b05a1e; font-size: 0.9rem; text-transform: uppercase; }
        .popup-content p { margin: 5px 0; font-size: 0.85rem; line-height: 1.4; color: #333; }
        
        .tag {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        
        .multimedia-link {
            display: block;
            margin-top: 10px;
            padding: 8px;
            background: #ff0000;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .multimedia-link:hover { background: #cc0000; }
        
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            font-size: 1.2rem;
            color: #1a5e3c;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="map-header">
        <h1>☘️ Craic? Deep Culture Map</h1>
        <p id="stats">Enriching towns and villages...</p>
    </div>
    
    <div id="loading" class="loading-overlay">Loading Ireland's stories...</div>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // Initialize map
        const map = L.map('map').setView([53.3498, -7.2604], 7); // Center of Ireland
        
        // Add tile layer (Stadia Alidade Smooth is nice and clean)
        L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            attribution: '&copy; <a href="https://stadiamaps.com/">Stadia Maps</a>, &copy; <a href="https://openmaptiles.org/">OpenMapTiles</a> &copy; <a href="http://openstreetmap.org">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Function to safely access nested properties
        function safeGet(obj, path, defaultValue = 'N/A') {
            try {
                return path.split('.').reduce((current, prop) => current?.[prop], obj) || defaultValue;
            } catch (e) {
                return defaultValue;
            }
        }

        // Function to create popup content
        function createPopup(props) {
            const etymology = typeof props.etymology === 'string' 
                ? props.etymology 
                : (props.etymology?.meaning || props.etymology?.origin || 'N/A');
            
            const landmarks = Array.isArray(props.history_landmarks)
                ? props.history_landmarks.join(', ')
                : (props.history_landmarks?.events || props.history_landmarks?.ruins || props.history_landmarks || 'N/A');
            
            const gaaClub = props.gaa_heritage?.club_name || props.gaa_heritage?.club || 'TBD';
            const gaaColors = Array.isArray(props.gaa_heritage?.colors)
                ? props.gaa_heritage.colors.join('/')
                : (props.gaa_heritage?.colors || 'TBD');
            
            const hiddenGem = typeof props.hidden_gem === 'string'
                ? props.hidden_gem
                : (props.hidden_gem?.spot || 'N/A');
            
            const seanfhocailIrish = props.seanfhocail?.irish || 'Ar scáth a chéile a mhaireann na daoine';
            const seanfhocailEnglish = props.seanfhocail?.english || "People live in each other's shelter";
            
            let html = `
                <div class="popup-content">
                    <h3>${props.name}</h3>
                    <div style="margin-bottom: 10px;">
                        <span class="tag">${props.type}</span>
                        <span class="tag">${props.county || 'Ireland'}</span>
                    </div>
                    
                    <h4>📜 Etymology</h4>
                    <p><strong>${props.name_ga || props.name}</strong>: ${etymology}</p>
                    
                    <h4>👻 Folklore & Myth</h4>
                    <p>${props.folklore_myth || 'Coming soon...'}</p>
                    
                    <h4>🏛️ History & Landmarks</h4>
                    <p>${landmarks}</p>
                    
                    <h4>🏆 GAA Heritage</h4>
                    <p>${gaaClub} (${gaaColors})</p>
                    
                    <h4>✨ Hidden Gem</h4>
                    <p>${hiddenGem}</p>
                    
                    <h4>☘️ Irish Proverb (Seanfhocail)</h4>
                    <p><em>"${seanfhocailIrish}"</em></p>
                    <p style="font-size: 0.9rem; color: #555; margin-top: 5px;">${seanfhocailEnglish}</p>
                    
                    <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(props.multimedia_query || props.name)}" target="_blank" class="multimedia-link">
                        🎵 Hear the Sound of ${props.name}
                    </a>
                </div>
            `;
            return html;
        }

        // Fetch data
        async function loadData() {
            try {
                console.log("Fetching data from /data endpoint...");
                const response = await fetch('/data');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log("Successfully loaded " + data.features.length + " places");
                
                if (!data.features || data.features.length === 0) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('stats').innerText = "No enriched data yet. Run enrich_ireland_culture.py first.";
                    console.warn("No features found in GeoJSON response");
                    return;
                }
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('stats').innerText = `Loaded ${data.features.length} enriched places.`;
                
                L.geoJSON(data, {
                    pointToLayer: function(feature, latlng) {
                        return L.circleMarker(latlng, {
                            radius: feature.properties.type === 'city' ? 8 : 6,
                            fillColor: "#1a5e3c",
                            color: "#fff",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.8
                        });
                    },
                    onEachFeature: function(feature, layer) {
                        layer.bindPopup(createPopup(feature.properties));
                    }
                }).addTo(map);
                
                console.log("Markers added to map successfully!");
            } catch (err) {
                console.error("Error loading data:", err);
                document.getElementById('loading').innerText = `Error: ${err.message}. Is the server running on localhost:5001?`;
                document.getElementById('loading').style.background = "rgba(255, 100, 100, 0.8)";
            }
        }

        loadData();
        
        // Refresh data every 30 seconds to show progress
        setInterval(loadData, 30000);
    </script>
</body>
</html>
